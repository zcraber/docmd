name: Release to NPM and GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm -r run build

      - name: Run Tests
        run: node scripts/failsafe.js

      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      # --- 2. Publish to NPM ---
      # - name: Setup .npmrc for NPMJS
      #  run: |
      #    echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          
      - name: Publish to NPM
        run: npm publish --workspaces --access public
        # env:
        #  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 3. Publish to GitHub Packages ---
      # We must clean the previous .npmrc and setup for GPR
      - name: Setup .npmrc for GitHub Packages
        run: |
          echo "@docmd:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish to GitHub Packages
        # We use --no-git-checks because the tag already exists from the NPM publish step
        # We might need 'continue-on-error' if versions already exist
        run: pnpm -r publish --access public --no-git-checks || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}