name: Release to NPM and GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v6

      # Install exact pnpm version (matches package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Setup Node.js with pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # Verify versions (debug safety)
      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v

      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all packages
      - name: Build packages
        run: pnpm -r run build

      # Run failsafe tests
      - name: Run tests
        run: node scripts/failsafe.js

      # Copy LICENSE into each package
      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      # Resolve workspace dependencies
      - name: Resolve workspace dependencies
        run: node scripts/resolve-ws-deps.js

      # Publish to npm (OIDC trusted publishing)
      - name: Publish to npm
        run: npm publish --workspaces --include-workspace-root=false --access public