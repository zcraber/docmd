name: Release to NPM and GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm for dev workflow
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # Setup Node + npm registry for OIDC
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # Ensure latest npm (future-proofing workspace semantics)
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm -r run build

      - name: Run Tests
        run: node scripts/failsafe.js

      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      # ---------- Publish to npmjs via OIDC ----------
      - name: Publish to NPM (OIDC)
        run: npm publish --workspaces --include-workspace-root=false --access public

      # ---------- Publish to GitHub Packages ----------
      - name: Setup .npmrc for GitHub Packages
        run: |
          echo "@docmd:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish to GitHub Packages
        run: npm publish --workspaces --include-workspace-root=false --access public || true